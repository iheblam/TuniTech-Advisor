services:
  # ── FastAPI Backend ─────────────────────────────────────────────
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: tunitech-backend
    ports:
      - "8000:8000"
    # Load all secrets from the .env file (GROQ_API_KEY, JWT_SECRET, etc.)
    env_file:
      - .env
    environment:
      - MLFLOW_TRACKING_URI=./mlruns
      - DATA_PATH=./dataset
      - DEBUG=false
      # Allow requests from the nginx frontend container and local browser
      - CORS_ORIGINS=http://localhost:3000,http://localhost,http://frontend:80,http://frontend
    volumes:
      # Pre-trained model artefacts (read-heavy, bind-mounted for easy updates)
      - ./mlruns:/app/mlruns
      - ./models:/app/models
      # Persistent community data: reviews, trending, price history, users
      - ./data:/app/data
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/v1/health/')"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 40s
    restart: unless-stopped

  # ── React / Vite Frontend (built + served by nginx) ────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      # VITE_ vars are baked into the JS bundle at build time.
      # Leave empty here so nginx proxies /api/ to the backend container.
      # For cloud (Render / Vercel) set VITE_API_BASE_URL to the backend URL.
      args:
        - VITE_API_BASE_URL=
    container_name: tunitech-frontend
    ports:
      - "3000:80"
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped

networks:
  default:
    name: tunitech-network
