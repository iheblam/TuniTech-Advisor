services:
  # ── FastAPI Backend ─────────────────────────────────────────────
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: tunitech-backend
    ports:
      - "8000:8000"
    environment:
      - MLFLOW_TRACKING_URI=./mlruns
      - DATA_PATH=./dataset
      - DEBUG=true
      - CORS_ORIGINS=http://localhost:3000,http://frontend:80
    volumes:
      # Persist MLflow runs and trained models between restarts
      - ./mlruns:/app/mlruns
      - ./models:/app/models
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/v1/health/')"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s
    restart: unless-stopped

  # ── React / Vite Frontend (built + served by nginx) ────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: tunitech-frontend
    ports:
      - "3000:80"
    depends_on:
      - backend
    restart: unless-stopped

networks:
  default:
    name: tunitech-network
